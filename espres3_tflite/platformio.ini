; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.upstream_packages = no

# 覆盖默认硬件配置
board_build.flash_size = 8MB
board_build.psram = opi
board_build.psram_size = 8MB

# 文件系统配置
board_build.partitions = partitions.csv
board_build.filesystem = fatfs

; 库依赖 - 修正TensorFlow库引用
lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.0
    espressif/esp32-camera @ ^2.0.0
    C:\Users\Hamster\Documents\Arduino\libraries 

# USB 配置
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=0   ; 禁用USB CDC启动
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
        -Wl,-Tesp32s3.rom.ld
        -Wl,-Tesp32s3.peripherals.ld
        -fexceptions
    ; 添加TFT配置文件标志
    -D USER_SETUP_LOADED=1
    -D USER_SETUP_FILENAME="User_Setup.h"
    -D ST7789_DRIVER                ; 屏幕驱动（与User_Setup.h一致）
    -D TFT_WIDTH=240                ; 屏幕宽度（与User_Setup.h一致）
    -D TFT_HEIGHT=240               ; 屏幕高度（与User_Setup.h一致）
    -D TFT_ROTATION=1               ; 屏幕旋转（与User_Setup.h一致）
    -D TFT_CS=21                      ; 屏幕CS引脚
    -D TFT_DC=40                      ; 屏幕DC引脚
    -D TFT_RST=-1                     ; 不使用硬件复位
    -D TFT_BL=1                       ; 背光引脚
    ; 添加摄像头配置标志
    -D CAMERA_MODEL_AI_THINKER

lib_ignore = 
    Arduino_TensorFlowLite/src/peripherals/i2s_nrf52840.cpp
    Arduino_TensorFlowLite/src/peripherals/ws_wm8960_audio_hat_nrf52840.cpp

# 串口配置
monitor_speed = 115200
upload_speed = 921600

